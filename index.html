 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Tower - Youssef Yasser</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body { 
            font-family: 'Orbitron', sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .page-container {
            max-width: 480px; 
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        
        .company-logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 8px rgba(244, 185, 59, 0.3));
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 25px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: linear-gradient(135deg, #f4b93b, #a87914);
            padding: 3px;
             animation: float 3s ease-in-out infinite;
        }

        .profile-hex {
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            object-fit: cover;
            background-color: #111111;
            display: block;
        }

        h2 { 
            color: #f4b93b; 
            margin-bottom: 8px; 
            font-size: 20px; 
            font-weight: 700;
            line-height: 1.4;
        }

        .title { 
            color: #ffffff; 
            font-size: 13px; 
            margin-bottom: 35px; 
            font-weight: 600;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
            margin-bottom: 35px;
        }

      
        .btn-card {
            display: flex;
            align-items: center;
            width: 100%; 
            height: 70px; 
            background-color: #111622; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            text-decoration: none;
            padding: 0 20px;
            text-align: left;
            transition: all 0.25s ease-in-out;
        }

        .btn-card .icon-box {
            font-size: 24px;
            margin-right: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
        }

       
        .btn-card .text-box {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn-card .text-box .main-text {
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px;
            font-family: Arial, sans-serif;
        }

        .btn-card .text-box .sub-text {
            color: #8fa0b5;
            font-size: 11px;
            font-weight: 400;
            font-family: Arial, sans-serif;
        }

      
        .btn-call .icon-box { color: #f4b93b; }
        .btn-call:hover, .btn-call:active {
            background-color: #f4b93b !important;
            border-color: #f4b93b !important;
            box-shadow: 0 0 25px rgba(244, 185, 59, 0.6);
            transform: scale(0.98);
        }
        .btn-call:hover .main-text, .btn-call:active .main-text,
        .btn-call:hover .icon-box, .btn-call:active .icon-box { color: #000000 !important; }
        .btn-call:hover .sub-text, .btn-call:active .sub-text { color: #222222 !important; }

        
        .btn-whatsapp .icon-box { color: #25D366; }
        .btn-whatsapp:hover, .btn-whatsapp:active {
            background-color: #25D366 !important;
            border-color: #25D366 !important;
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.6);
            transform: scale(0.98);
        }
        .btn-whatsapp:hover .main-text, .btn-whatsapp:active .main-text,
        .btn-whatsapp:hover .icon-box, .btn-whatsapp:active .icon-box { color: #000000 !important; }
        .btn-whatsapp:hover .sub-text, .btn-whatsapp:active .sub-text { color: #111111 !important; }

        .btn-save .icon-box { color: #ff9f43; }
        .btn-save:hover, .btn-save:active {
            background-color: #ff9f43 !important;
            border-color: #ff9f43 !important;
            box-shadow: 0 0 25px rgba(255, 159, 67, 0.6);
            transform: scale(0.98);
        }
        .btn-save:hover .main-text, .btn-save:active .main-text,
        .btn-save:hover .icon-box, .btn-save:active .icon-box { color: #000000 !important; }
        .btn-save:hover .sub-text, .btn-save:active .sub-text { color: #222222 !important; }

        .btn-linkedin .icon-box { color: #0077B5; }
        .btn-linkedin:hover, .btn-linkedin:active {
            background-color: #0077B5 !important;
            border-color: #0077B5 !important;
            box-shadow: 0 0 25px rgba(0, 119, 181, 0.6);
            transform: scale(0.98);
        }
        .btn-linkedin:hover .sub-text, .btn-linkedin:active .sub-text { color: #d0e8f5 !important; }

        .btn-facebook .icon-box { color: #1877F2; }
        .btn-facebook:hover, .btn-facebook:active {
            background-color: #1877F2 !important;
            border-color: #1877F2 !important;
            box-shadow: 0 0 25px rgba(24, 119, 242, 0.6);
            transform: scale(0.98);
        }
        .btn-facebook:hover .sub-text, .btn-facebook:active .sub-text { color: #e2ecf9 !important; }

        .btn-instagram .icon-box { color: #f09433; }
        .btn-instagram:hover, .btn-instagram:active {
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888) !important;
            border-color: transparent !important;
            box-shadow: 0 0 25px rgba(220, 39, 67, 0.6);
            transform: scale(0.98);
        }
        .btn-instagram:hover .icon-box, .btn-instagram:active .icon-box { color: #ffffff !important; }
        .btn-instagram:hover .sub-text, .btn-instagram:active .sub-text { color: #f9e6ec !important; }

      
        .btn-company { 
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 12px;
            padding: 16px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            background-color: transparent;
            border: 2px solid #f4b93b;
            color: #f4b93b;
            box-shadow: 0 4px 10px rgba(244, 185, 59, 0.05);
            transition: all 0.2s ease-in-out;
        }
        
        .btn-company:hover, .btn-company:active {
            background-color: #f4b93b !important;
            color: #000000 !important;
            box-shadow: 0 6px 25px rgba(244, 185, 59, 0.5) !important;
            transform: scale(0.98);
        }
@keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-8px); 
    }
    100% {
        transform: translateY(0px);
    }
}
    </style>
</head>

<script>

        var buttons = document.querySelectorAll('.btn-card, .btn-company');
